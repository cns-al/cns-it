services:
  cns-it:
    build: .
    container_name: cns-it
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data

  drawio:
    image: jgraph/drawio:latest
    container_name: cns-drawio
    restart: unless-stopped
    ports:
      - "8080:8080"
