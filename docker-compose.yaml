services:
  cns-it:
    build: .
    container_name: cns-it
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/auth/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - cns-it-net
    depends_on:
      drawio:
        condition: service_healthy

  drawio:
    image: jgraph/drawio:latest
    container_name: cns-drawio
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - cns-it-net

networks:
  cns-it-net:
    driver: bridge
    internal: false
